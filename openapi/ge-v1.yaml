components:
  parameters:
    ProjectId:
      name: project_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TaskId:
      name: task_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    GateItemId:
      name: gate_item_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PhaseId:
      name: phase_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProgramId:
      name: program_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ObjectiveId:
      name: objective_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserId:
      name: user_id
      in: path
      required: true
      schema:
        type: string
  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDetail'
    Forbidden:
      description: Permission denied
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDetail'
    NotFound:
      description: Not found or soft-deleted (detail project_not_found)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDetail'
    Conflict:
      description: State conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDetail'
  schemas:
    ErrorDetail:
      type: object
      required: [detail]
      properties:
        detail:
          type: string
          description: e.g. project_not_found, gate_item_orphan_signer, note_title_conflict, project_note_required, deviation_not_activated, deviation_already_open, system_node_not_deviatable, deviation_produce_immutable, task_deviated_immutable, remediation_task_not_deletable, owner_required, has_children, default_node_immutable, not_subtree_governor, not_project_governor
    CreateObjectiveRequest:
      type: object
      required: [name, parent_id, owner_user_id]
      properties:
        name:
          type: string
        parent_id:
          type: string
          format: uuid
        owner_user_id:
          type: string
        period_granularity:
          $ref: '#/components/schemas/PeriodGranularity'
        period_start:
          type: string
          format: date
          description: YYYY-MM-DD · sub must fall within parent company year
        period_end:
          type: string
          format: date
        primary_department_id:
          type: string
          format: uuid
          description: Required for non-default sub-objectives (M29)
    PatchObjectiveRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
        owner_user_id:
          type: string
        period_granularity:
          $ref: '#/components/schemas/PeriodGranularity'
        period_start:
          type: string
          format: date
        period_end:
          type: string
          format: date
        primary_department_id:
          type: string
          format: uuid
          nullable: true
    CreateObjectiveYearRequest:
      type: object
      required: [planning_year]
      properties:
        planning_year:
          type: integer
          minimum: 2000
          maximum: 2100
          description: Calendar year; creates is_default=false company tree; syncs b1 period in same transaction
        copy_from_year:
          type: integer
          minimum: 2000
          maximum: 2100
          nullable: true
          description: Optional copy structure from prior annual tree; never copies default chain b1/b2/b3
    StrategicAssessRequest:
      type: object
      required: [outcome]
      properties:
        outcome:
          type: string
          enum: [met, partial_met, not_met]
        note:
          type: string
          maxLength: 2000
    PeopleSummaryAccountable:
      type: object
      properties:
        user_id: { type: string }
        display_name: { type: string }
        role: { type: string, enum: [owner, pm] }
        node_type: { type: string, enum: [objective, program, project] }
        node_id: { type: string }
        node_name: { type: string }
    PeopleSummaryContributing:
      type: object
      properties:
        user_id: { type: string }
        display_name: { type: string }
        projects:
          type: array
          items:
            type: object
            properties:
              project_id: { type: string }
              project_name: { type: string }
              task_count: { type: integer }
    PeopleSummary:
      type: object
      properties:
        accountable:
          type: array
          items:
            $ref: '#/components/schemas/PeopleSummaryAccountable'
        contributing:
          type: array
          items:
            $ref: '#/components/schemas/PeopleSummaryContributing'
        include_completed: { type: boolean }
    GoalPortfolioPrimary:
      type: object
      properties:
        node_type: { type: string, enum: [objective, program] }
        node_id: { type: string }
        node_name: { type: string }
        lifecycle_status: { type: string }
        planning_year: { type: integer, nullable: true }
    GoalPortfolio:
      type: object
      properties:
        primary:
          type: array
          items:
            $ref: '#/components/schemas/GoalPortfolioPrimary'
        accountable:
          type: array
          items:
            type: object
            properties:
              user_id: { type: string }
              display_name: { type: string }
              org_path: { type: string, nullable: true }
              items:
                type: array
                items:
                  type: object
                  properties:
                    node_type: { type: string }
                    node_id: { type: string }
                    node_name: { type: string }
                    role: { type: string }
        contributing:
          type: array
          items:
            type: object
            properties:
              user_id: { type: string }
              display_name: { type: string }
              org_path: { type: string, nullable: true }
              projects:
                type: array
                items:
                  type: object
                  properties:
                    project_id: { type: string }
                    project_name: { type: string }
                    task_count: { type: integer }
        include_completed: { type: boolean }
        include_archived: { type: boolean }
    PeriodGranularity:
      type: string
      enum: [year, month, quarter]
    StrategicLifecycleStatus:
      type: string
      enum: [active, pending_assessment, met, partial_met, not_met, archived]
    StrategicFields:
      type: object
      properties:
        period_granularity:
          $ref: '#/components/schemas/PeriodGranularity'
        period_start:
          type: string
          format: date
        period_end:
          type: string
          format: date
        lifecycle_status:
          $ref: '#/components/schemas/StrategicLifecycleStatus'
        primary_department_id:
          type: string
          format: uuid
          nullable: true
        primary_department_needs_confirmation:
          type: boolean
        primary_department_name:
          type: string
          nullable: true
          description: BFF aggregation optional
        planning_year:
          type: integer
          readOnly: true
          description: Response only · company level · is_default=false · derived YEAR(period_start) · no DB column
    CreateProgramRequest:
      type: object
      required: [name, objective_id, owner_user_id]
      properties:
        name:
          type: string
        objective_id:
          type: string
          format: uuid
        owner_user_id:
          type: string
        period_granularity:
          $ref: '#/components/schemas/PeriodGranularity'
        period_start:
          type: string
          format: date
        period_end:
          type: string
          format: date
        primary_department_id:
          type: string
          format: uuid
          description: Required for non-default programs (M29)
    PatchProgramRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
        owner_user_id:
          type: string
        objective_id:
          type: string
          format: uuid
        period_granularity:
          $ref: '#/components/schemas/PeriodGranularity'
        period_start:
          type: string
          format: date
        period_end:
          type: string
          format: date
        primary_department_id:
          type: string
          format: uuid
          nullable: true
    PatchProjectProgramRequest:
      type: object
      required: [program_id]
      properties:
        program_id:
          type: string
          format: uuid
    PatchProjectRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
        pm_user_id:
          type: string
        program_id:
          type: string
          format: uuid
          description: P2 · structural migrate · source/target governor or PM
    CreateProjectRequest:
      type: object
      required: [name, pm_user_id, phases]
      properties:
        name:
          type: string
        pm_user_id:
          type: string
        program_id:
          type: string
          format: uuid
        project_note_id:
          type: string
          format: uuid
          description: M19 · KB note uuid · set by BFF after note creation
        phases:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CreatePhaseInput'
    CreatePhaseInput:
      type: object
      required: [sequence, name, gate_items, tasks]
      properties:
        sequence:
          type: integer
          minimum: 1
        name:
          type: string
        gate_items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/GateItemInput'
        tasks:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/TaskInput'
    GateItemInput:
      type: object
      required: [key, name, form]
      properties:
        key:
          type: string
          description: Request-scoped alias; not returned in graph (use gate_item id)
        name:
          type: string
        form:
          type: string
          enum: [material]
        payload:
          type: object
          additionalProperties: true
    TaskInput:
      type: object
      required: [key, title, assignee_user_id]
      properties:
        key:
          type: string
        title:
          type: string
        assignee_user_id:
          type: string
        produces:
          type: array
          items:
            type: string
          description: gate_item keys in create request only
        prerequisites:
          type: array
          items:
            type: string
          description: gate_item keys in create request only
    AddPhaseTaskRequest:
      type: object
      required: [assignee_user_id]
      properties:
        title:
          type: string
          description: Defaults to 新任务 when omitted
        assignee_user_id:
          type: string
          description: Required; server does not fall back to pm_user_id
    AddPhaseGateItemRequest:
      type: object
      required: [planned_due]
      properties:
        name:
          type: string
        planned_due:
          type: string
          format: date
        form:
          type: string
          enum: [material, metric, status]
          default: material
        target_value:
          oneOf:
            - type: number
            - type: string
        operator:
          type: string
          enum: ['>=', '<=', '==', '>', '<']
        target_state:
          type: string
    CreateProjectResponse:
      type: object
      required: [id, name, status, program_id, pm_user_id, created_by_user_id, project_note_id, graph_summary]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
          enum: [draft]
        program_id:
          type: string
          format: uuid
        pm_user_id:
          type: string
        created_by_user_id:
          type: string
        project_note_id:
          type: string
          format: uuid
          description: Bound project Note in 项目管理 topic
        graph_summary:
          type: object
          properties:
            phase_count:
              type: integer
            task_count:
              type: integer
            gate_item_count:
              type: integer
    ProjectGraph:
      type: object
      required: [project, phases]
      properties:
        project:
          $ref: '#/components/schemas/ProjectSummary'
        phases:
          type: array
          items:
            $ref: '#/components/schemas/PhaseGraph'
        graph_editable:
          type: boolean
          description: M24 · caller may edit graph (PM or subtree_governor or reviewer service)
        graph_deletable:
          type: boolean
          description: M24 · caller may delete graph nodes
        is_governor:
          type: boolean
          description: M24 · can_govern_project for caller
    ProjectSummary:
      type: object
      required: [id, name, status, pm_user_id, program_id, created_by_user_id]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
        pm_user_id:
          type: string
        program_id:
          type: string
        created_by_user_id:
          type: string
        project_note_id:
          type: string
          format: uuid
          nullable: true
          description: M19 · kb note uuid · null only for pre-M19 legacy rows
    ProgramMetadata:
      allOf:
        - $ref: '#/components/schemas/StrategicFields'
        - type: object
          required: [id, name, objective_id, is_default]
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
            objective_id:
              type: string
              format: uuid
            is_default:
              type: boolean
            owner_user_id:
              type: string
              nullable: true
    ObjectiveNode:
      allOf:
        - $ref: '#/components/schemas/StrategicFields'
        - type: object
          required: [id, name, is_default, programs]
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
            is_default:
              type: boolean
            owner_user_id:
              type: string
              nullable: true
            parent_id:
              type: string
              format: uuid
              nullable: true
            programs:
              type: array
              description: Program metadata only; no nested foreign project names
              items:
                $ref: '#/components/schemas/ProgramMetadata'
            children:
              type: array
              items:
                $ref: '#/components/schemas/ObjectiveNode'
    ProgramDetail:
      allOf:
        - $ref: '#/components/schemas/ProgramMetadata'
        - type: object
          required: [projects]
          properties:
            projects:
              type: array
              description: JWT filtered to participant ∪ draft creator ∪ subtree_governor (P2)
              items:
                $ref: '#/components/schemas/ProjectSummary'
    UserOrgProfile:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: string
        primary_membership_id:
          type: string
          nullable: true
          description: v2.23 · FK to user_org_memberships.id
        memberships:
          type: array
          description: v2.22 · aggregated on GET profile
          items:
            $ref: '#/components/schemas/OrgMembership'
        department_id:
          type: string
          nullable: true
          deprecated: true
          description: Removed in v2.22 migration 017 · use memberships[]
        team_id:
          type: string
          nullable: true
          deprecated: true
          description: Removed in v2.22 migration 017 · use memberships[]
        proficiency:
          type: string
          nullable: true
        manager_user_id:
          type: string
          nullable: true
    OrgMembership:
      type: object
      required: [id, user_id, department_id]
      properties:
        id:
          type: string
        user_id:
          type: string
        department_id:
          type: string
        team_id:
          type: string
          nullable: true
        is_primary:
          type: boolean
          description: BFF denormalized · v2.23
        org_path:
          type: string
          description: Single path segment · BFF computed
    CreateOrgMembershipRequest:
      type: object
      required: [department_id]
      properties:
        department_id:
          type: string
        team_id:
          type: string
          nullable: true
        primary_membership_id:
          type: string
          nullable: true
          description: Required when resulting membership count >= 2 and none set
    PatchUserOrgProfileRequest:
      type: object
      properties:
        primary_membership_id:
          type: string
          nullable: true
        manager_user_id:
          type: string
          nullable: true
        proficiency:
          type: string
          nullable: true
    OrgDepartmentOut:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        manager_user_id:
          type: string
          nullable: true
        department_note_id:
          type: string
          nullable: true
          description: M28 · logical FK to knowledge base note uuid
        teams:
          type: array
          items:
            $ref: '#/components/schemas/OrgTeamOut'
    OrgTeamOut:
      type: object
      required: [id, name, department_id]
      properties:
        id:
          type: string
        department_id:
          type: string
        name:
          type: string
        lead_user_id:
          type: string
          nullable: true
        team_note_id:
          type: string
          nullable: true
          description: M28 · logical FK to knowledge base note uuid
    PatchOrgDepartmentRequest:
      type: object
      properties:
        name:
          type: string
        manager_user_id:
          type: string
          nullable: true
        department_note_id:
          type: string
          nullable: true
          description: M28 · service bind only · no body text
    PatchOrgTeamRequest:
      type: object
      properties:
        name:
          type: string
        lead_user_id:
          type: string
          nullable: true
        team_note_id:
          type: string
          nullable: true
          description: M28 · service bind only · no body text
    OrgCharterExcerpt:
      type: object
      required: [bound]
      properties:
        bound:
          type: boolean
          description: false when department_note_id/team_note_id is null
        note_id:
          type: string
          nullable: true
        excerpt:
          type: string
          nullable: true
          description: Plain text, max 500 chars, markdown stripped; null when unbound or empty body
    PhaseGraph:
      type: object
      required: [id, sequence, name, status, gate, gate_items, tasks]
      properties:
        id:
          type: string
        sequence:
          type: integer
        name:
          type: string
        status:
          type: string
        planned_start:
          type: string
          format: date
          nullable: true
        planned_end:
          type: string
          format: date
          nullable: true
        gate:
          type: object
          required: [id, is_open]
          properties:
            id:
              type: string
            is_open:
              type: boolean
        gate_items:
          type: array
          items:
            $ref: '#/components/schemas/GateItemGraph'
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/TaskGraph'
    GateItemGraph:
      type: object
      required: [id, name, form, status, eligible_signers]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        form:
          type: string
        status:
          type: string
        payload:
          type: object
        submitted_by:
          type: string
          nullable: true
        signed_by:
          type: string
          nullable: true
        rejected_by:
          type: string
          nullable: true
        planned_due:
          type: string
          format: date
          nullable: true
        submitted_at:
          type: string
          format: date-time
          nullable: true
        signed_at:
          type: string
          format: date-time
          nullable: true
        rejected_at:
          type: string
          format: date-time
          nullable: true
        reject_reason:
          type: string
          nullable: true
        eligible_signers:
          type: array
          items:
            type: string
        is_system:
          type: boolean
          description: M20 built-in lifecycle gate item; immutable structure
        is_overdue:
          type: boolean
          description: P3 derived · overdue stamp · mutually exclusive with deviation status stamp
        is_remediation_overdue:
          type: boolean
          description: P3 derived · remediation_due past · meta highlight · extend menu
        deviation:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/DeviationSummary'
    TaskEffectiveStatus:
      type: string
      enum: [waiting, actionable, complete, deviated]
      description: M23 B′ read-time derived task progress relative to JWT subject (actor) · normative · 需求 §4.6.2
    TaskGraph:
      type: object
      description: produces/prerequisites are ge_gate_items.id (UUID), not create-request keys
      required: [id, title, effective_status, assignee_user_id, phase_id, produces, prerequisites]
      properties:
        id:
          type: string
        title:
          type: string
        effective_status:
          $ref: '#/components/schemas/TaskEffectiveStatus'
        status:
          type: string
          deprecated: true
          description: Legacy persisted column · stop-write M23 · do not use for progress
        assignee_user_id:
          type: string
        phase_id:
          type: string
        produces:
          type: array
          description: ge_gate_items.id UUIDs
          items:
            type: string
            format: uuid
        prerequisites:
          type: array
          description: ge_gate_items.id UUIDs
          items:
            type: string
            format: uuid
        is_system:
          type: boolean
          description: M20 built-in lifecycle task; title/phase immutable; 确认结项 assignee follows pm_user_id (system_sign_route_immutable on assignee patch / prerequisite delete)
        deviation_id:
          type: string
          format: uuid
          nullable: true
          description: P3 remediation task only
        is_remediation:
          type: boolean
          description: P3 derived · deviation_id IS NOT NULL
    MeQueuesResponse:
      type: object
      required: [submit, sign, actionable_tasks, deviation_actions]
      properties:
        submit:
          type: array
          items:
            $ref: '#/components/schemas/QueueGateItem'
        sign:
          type: array
          items:
            $ref: '#/components/schemas/QueueGateItem'
        actionable_tasks:
          type: array
          items:
            $ref: '#/components/schemas/QueueActionableTask'
        ready_tasks:
          type: array
          deprecated: true
          description: Deprecated alias of actionable_tasks · removed in a future OpenAPI minor
          items:
            $ref: '#/components/schemas/QueueActionableTask'
        deviation_actions:
          type: array
          items:
            $ref: '#/components/schemas/QueueDeviationAction'
    OpenDeviationRequest:
      type: object
      properties:
        kind:
          type: string
          enum: [overdue, scope]
          default: overdue
    PatchDeviationRequest:
      oneOf:
        - $ref: '#/components/schemas/ActivateDeviationRequest'
        - $ref: '#/components/schemas/ExtendDeviationRequest'
        - $ref: '#/components/schemas/CancelDeviationRequest'
      discriminator:
        propertyName: action
        mapping:
          activate: '#/components/schemas/ActivateDeviationRequest'
          extend: '#/components/schemas/ExtendDeviationRequest'
          cancel: '#/components/schemas/CancelDeviationRequest'
    ActivateDeviationRequest:
      type: object
      required: [action, reason, remediation_plan, remediation_due]
      properties:
        action:
          type: string
          enum: [activate]
        reason:
          type: string
        remediation_plan:
          type: string
        remediation_due:
          type: string
          format: date
        assignee_user_id:
          type: string
    ExtendDeviationRequest:
      type: object
      required: [action, remediation_due, extend_reason]
      properties:
        action:
          type: string
          enum: [extend]
        remediation_due:
          type: string
          format: date
        extend_reason:
          type: string
        remediation_plan:
          type: string
          description: Required when revision >= 3 before extend
    CancelDeviationRequest:
      type: object
      required: [action, cancel_reason]
      properties:
        action:
          type: string
          enum: [cancel]
        cancel_reason:
          type: string
    DeviationSummary:
      type: object
      required: [id, status, kind, revision]
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [open, active, closed, cancelled]
        kind:
          type: string
          enum: [overdue, scope]
        revision:
          type: integer
        remediation_due:
          type: string
          format: date
          nullable: true
        remediation_task_id:
          type: string
          format: uuid
    Deviation:
      allOf:
        - $ref: '#/components/schemas/DeviationSummary'
        - type: object
          properties:
            gate_item_id:
              type: string
              format: uuid
            project_id:
              type: string
              format: uuid
            reason:
              type: string
              nullable: true
            remediation_plan:
              type: string
              nullable: true
            superseded_task_id:
              type: string
              format: uuid
            gate_item_status_at_open:
              type: string
              description: GateItem status snapshot at open · cancel rollback
            superseded_task_status_at_open:
              type: string
              description: Superseded task status snapshot at open · cancel rollback
            opened_by_user_id:
              type: string
            opened_at:
              type: string
              format: date-time
            activated_at:
              type: string
              format: date-time
              nullable: true
            cancelled_at:
              type: string
              format: date-time
              nullable: true
    AffectedTask:
      type: object
      required: [id, title, effective_status, assignee_user_id, phase_id]
      properties:
        id:
          type: string
        title:
          type: string
        effective_status:
          $ref: '#/components/schemas/TaskEffectiveStatus'
        status:
          type: string
          deprecated: true
          description: Legacy persisted column · stop-write M23
        assignee_user_id:
          type: string
        phase_id:
          type: string
        deviation_id:
          type: string
          format: uuid
          nullable: true
        is_remediation:
          type: boolean
        produces:
          type: array
          items:
            type: string
            format: uuid
          description: Produce edge gate_item ids · refreshed on rebind/cancel
    WriteOperationResponse:
      type: object
      required: [gate_item, affected_tasks, gate, phase, project]
      properties:
        gate_item:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/GateItemGraph'
        affected_tasks:
          type: array
          items:
            $ref: '#/components/schemas/AffectedTask'
        deviation:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/DeviationSummary'
        gate:
          nullable: true
          type: object
          properties:
            id:
              type: string
            phase_id:
              type: string
            is_open:
              type: boolean
        phase:
          nullable: true
          type: object
          properties:
            id:
              type: string
            sequence:
              type: integer
            name:
              type: string
            status:
              type: string
        project:
          type: object
          required: [id, status]
          properties:
            id:
              type: string
            status:
              type: string
    QueueDeviationAction:
      type: object
      required: [action, project_id, project_name, gate_item_id, gate_item_name, phase_name]
      properties:
        action:
          type: string
          enum: [open, activate, extend]
        project_id:
          type: string
        project_name:
          type: string
        gate_item_id:
          type: string
        gate_item_name:
          type: string
        phase_name:
          type: string
        deviation_id:
          type: string
          nullable: true
        remediation_task_id:
          type: string
          nullable: true
    QueueGateItem:
      type: object
      required: [gate_item_id, gate_item_name, project_id, project_name, phase_name]
      properties:
        gate_item_id:
          type: string
        gate_item_name:
          type: string
        project_id:
          type: string
        project_name:
          type: string
        phase_name:
          type: string
        submitted_by_user_id:
          type: string
          nullable: true
    QueueActionableTask:
      type: object
      required: [task_id, task_title, project_id, project_name, phase_name, effective_status]
      properties:
        task_id:
          type: string
        task_title:
          type: string
        project_id:
          type: string
        project_name:
          type: string
        phase_name:
          type: string
        effective_status:
          $ref: '#/components/schemas/TaskEffectiveStatus'
    QueueReadyTask:
      deprecated: true
      description: Renamed to QueueActionableTask (M23)
      allOf:
        - $ref: '#/components/schemas/QueueActionableTask'
