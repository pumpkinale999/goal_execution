openapi: 3.0.3
info:
  title: skstudio Project Governance (ge/org) API
  description: |
    Normative OpenAPI for P1 project governance domain (v1.1.3 · P1 spec frozen).
    Full spec: docs/目标与执行及其组织支撑(实现与测试).md §4.9
    Business rules: docs/目标与执行及其组织支撑(需求).md v2.16.0
    M20: system lifecycle tasks (启动项目/结项复盘/确认结项) · is_system on Task/GateItem
    M20b: 结项复盘 auto-seeded PM sign route (确认结项 prerequisite) · system_sign_route_immutable
    M21: permission simplification · PM=reviewer governance · not_project_governor
    v1.10.0: gate.includes auto-sync · POST/DELETE includes → 410 · Canvas produce/prerequisite only
    v1.10.2: end closure sign route auto-seed · protected prerequisite edge
    v1.11.0: M22 Deviation · open/activate/extend/cancel · graph is_overdue · queues deviation_actions
    v1.11.1: WriteOperationResponse.deviation · AffectedTask P3 fields · Deviation cancel snapshots · submit/done 409 deviation_not_activated
    v1.11.2: M22 deviation structure guards · produce unlink/rebind · patch deviated · delete remediation → 409 deviation_produce_immutable / task_deviated_immutable / remediation_task_not_deletable
    v1.12.0: REST-only workbench · DROP ge_execution_notifications · no skstudio ws-fanout
    v1.13.0 (P2 · M8): owner subtree_governor · structural CRUD objectives/programs · JWT read extension · service/BFF write (see impl §4.2.0.1)
    v1.14.0 (M23 · B′): Task effective_status read-time derivation (viewer/actor-relative) · actionable_tasks queue · Deprecated POST …/tasks/{id}/start|done · legacy ge_tasks.status stop-write · **spec draft ☑ · runtime pending**
    v1.15.0 (M24): can_govern_project includes subtree_governor (GE-26 superseded) · graph write for steward · ProjectGraph graph_editable/graph_deletable
    v1.16.0 (v2.22/v2.23 · runtime ☑): user_org_memberships · primary_membership_id · membership CRUD · primary_membership_required 409 · see impl §4.1.3 · req v2.23.2 invariant
    v1.17.3 (M28): KB topic org-charter (title 组织宪章) · paths org-charter/departments|teams/{slug} · see impl §4.1.4 · req v2.24.4
    v1.18.0 (M29 · runtime ☑): period_* · lifecycle_status · primary_department_id · POST /ge/objectives/years · assess · planning_year readOnly response · see impl §4.2.0.4 · req v2.26.0
    v1.19.0 (M30/M31 · runtime ☑): people-summary · goal-portfolio · migrate-primary-objectives · DELETE department 409 department_has_primary_objectives · see impl §4.2.4 · §4.1.5 · req v2.27.0
    Out of scope: skstudio BFF /api/v1/org|ge/* and POST /internal/ge/deviation-notify (see impl doc §4.0 · §5)
  version: 1.19.0
servers:
  - url: /api/v1
    description: goal_execution service (JWT participant + service governance via skstudio BFF)
paths:
  /org/departments:
    get:
      operationId: listOrgDepartments
      summary: Department tree (P0)
      tags: [org]
      responses:
        '200':
          description: Department tree
  /org/teams/{team_id}:
    patch:
      operationId: patchOrgTeam
      summary: Update team (service · reviewer BFF)
      tags: [org]
      parameters:
        - name: team_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Updated team
    delete:
      operationId: deleteOrgTeam
      summary: Delete team · unassign members (service · reviewer BFF)
      tags: [org]
      parameters:
        - name: team_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted
  /org/departments/{department_id}:
    delete:
      operationId: deleteOrgDepartment
      summary: Delete department when no teams (service · reviewer BFF)
      tags: [org]
      parameters:
        - name: department_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted
        '409':
          description: department_has_teams · department_has_primary_objectives (M31)
  /org/departments/{department_id}/goal-portfolio:
    get:
      operationId: getDepartmentGoalPortfolio
      summary: Department primary + participation rollup (M31 · service · BFF permission)
      tags: [org]
      parameters:
        - name: department_id
          in: path
          required: true
          schema: { type: string }
        - name: include_completed
          in: query
          schema: { type: integer, enum: [0, 1], default: 0 }
        - name: include_archived
          in: query
          schema: { type: integer, enum: [0, 1], default: 0 }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoalPortfolio'
  /org/departments/{department_id}/migrate-primary-objectives:
    post:
      operationId: migrateDepartmentPrimaryObjectives
      summary: Batch retarget primary_department_id (M31 · reviewer BFF)
      tags: [org]
      parameters:
        - name: department_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target_department_id]
              properties:
                target_department_id: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  objectives_migrated: { type: integer }
                  programs_migrated: { type: integer }
  /org/teams/{team_id}/goal-portfolio:
    get:
      operationId: getTeamGoalPortfolio
      summary: Team member participation rollup (M31)
      tags: [org]
      parameters:
        - name: team_id
          in: path
          required: true
          schema: { type: string }
        - name: include_completed
          in: query
          schema: { type: integer, enum: [0, 1], default: 0 }
        - name: include_archived
          in: query
          schema: { type: integer, enum: [0, 1], default: 0 }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoalPortfolio'
  /org/users/{user_id}/goal-portfolio:
    get:
      operationId: getUserGoalPortfolio
      summary: User accountable + contributing portfolio (M31)
      tags: [org]
      parameters:
        - $ref: '#/components/parameters/UserId'
        - name: include_completed
          in: query
          schema: { type: integer, enum: [0, 1], default: 0 }
        - name: include_archived
          in: query
          schema: { type: integer, enum: [0, 1], default: 0 }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoalPortfolio'
  /org/members:
    get:
      operationId: listOrgMembers
      summary: All org member profiles (service token · BFF aggregate)
      tags: [org]
      responses:
        '200':
          description: Member list
  /org/users/{user_id}/profile:
    get:
      operationId: getOrgUserProfile
      summary: Read org profile (JWT self only; reviewer others via skstudio BFF)
      tags: [org]
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User org profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserOrgProfile'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: patchOrgUserProfile
      summary: Update org scalars (service · reviewer BFF · v2.23 planning)
      tags: [org]
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchUserOrgProfileRequest'
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserOrgProfile'
        '400':
          description: invalid_primary_membership
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /org/users/{user_id}/memberships:
    post:
      operationId: createOrgUserMembership
      summary: Add org membership row (service · reviewer BFF · v2.22 planning)
      tags: [org]
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrgMembershipRequest'
      responses:
        '201':
          description: Created membership
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrgMembership'
        '409':
          description: primary_membership_required · department_membership_conflict
  /org/memberships/{membership_id}:
    delete:
      operationId: deleteOrgMembership
      summary: Remove one membership row (service · reviewer BFF · v2.22 planning)
      tags: [org]
      parameters:
        - name: membership_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted
        '404':
          $ref: '#/components/responses/NotFound'
  /ge/objectives:
    get:
      operationId: listGeObjectives
      summary: Objective tree with nested program metadata (P2 · JWT subtree_governor sees full subtree project names via programs/projects endpoints)
      tags: [ge-objectives]
      responses:
        '200':
          description: Objective tree
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ObjectiveNode'
    post:
      operationId: createGeObjective
      summary: Create sub-objective (P2 · service token · BFF subtree_governor or reviewer)
      tags: [ge-objectives]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateObjectiveRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectiveNode'
        '400':
          description: owner_required · validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '403':
          $ref: '#/components/responses/Forbidden'
  /ge/objectives/{objective_id}:
    patch:
      operationId: patchGeObjective
      summary: Rename or transfer owner (P2 · service · default nodes protected)
      tags: [ge-objectives]
      parameters:
        - $ref: '#/components/parameters/ObjectiveId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchObjectiveRequest'
      responses:
        '200':
          description: Updated
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: default_node_immutable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
    delete:
      operationId: deleteGeObjective
      summary: Delete empty non-default objective (P2 · has_children → 409)
      tags: [ge-objectives]
      parameters:
        - $ref: '#/components/parameters/ObjectiveId'
      responses:
        '204':
          description: Deleted
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: has_children · default_node_immutable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
  /ge/objectives/years:
    post:
      operationId: createGeObjectiveYear
      summary: Create annual business objective tree (M29 · reviewer · service token via BFF)
      tags: [ge-objectives]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateObjectiveYearRequest'
      responses:
        '201':
          description: Created annual company objective subtree; b1 period synced in same transaction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectiveNode'
        '400':
          description: validation · duplicate active year
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '403':
          $ref: '#/components/responses/Forbidden'
  /ge/objectives/{objective_id}/assess:
    post:
      operationId: assessGeObjective
      summary: Assess strategic objective lifecycle (M29 · reviewer · pending_assessment only)
      tags: [ge-objectives]
      parameters:
        - $ref: '#/components/parameters/ObjectiveId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StrategicAssessRequest'
      responses:
        '200':
          description: Assessed objective (then archived)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectiveNode'
        '400':
          description: not pending_assessment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '403':
          $ref: '#/components/responses/Forbidden'
  /ge/objectives/{objective_id}/people-summary:
    get:
      operationId: getObjectivePeopleSummary
      summary: People accountable/contributing rollup for objective subtree (M30)
      tags: [ge-objectives]
      parameters:
        - $ref: '#/components/parameters/ObjectiveId'
        - name: include_completed
          in: query
          schema: { type: integer, enum: [0, 1], default: 0 }
        - name: include_archived
          in: query
          schema: { type: integer, enum: [0, 1], default: 0 }
      responses:
        '200':
          description: PeopleSummary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PeopleSummary'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /ge/programs:
    get:
      operationId: listGePrograms
      summary: Program list (metadata only)
      tags: [ge-programs]
      responses:
        '200':
          description: Program list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProgramMetadata'
    post:
      operationId: createGeProgram
      summary: Create non-default program (P2 · service · BFF subtree_governor or reviewer)
      tags: [ge-programs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProgramRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgramMetadata'
        '400':
          description: owner_required · objective_id required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '403':
          $ref: '#/components/responses/Forbidden'
  /ge/programs/{program_id}:
    get:
      operationId: getGeProgram
      summary: Program detail with projects[] (JWT participant ∪ draft creator ∪ subtree_governor P2; reviewer via BFF)
      tags: [ge-programs]
      parameters:
        - $ref: '#/components/parameters/ProgramId'
      responses:
        '200':
          description: Program detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgramDetail'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: patchGeProgram
      summary: Rename, owner, or migrate objective_id (P2 · service · default protected)
      tags: [ge-programs]
      parameters:
        - $ref: '#/components/parameters/ProgramId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchProgramRequest'
      responses:
        '200':
          description: Updated
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: default_node_immutable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
    delete:
      operationId: deleteGeProgram
      summary: Delete empty non-default program (P2 · has_children → 409)
      tags: [ge-programs]
      parameters:
        - $ref: '#/components/parameters/ProgramId'
      responses:
        '204':
          description: Deleted
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: has_children · default_node_immutable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
  /ge/programs/{program_id}/assess:
    post:
      operationId: assessGeProgram
      summary: Assess strategic program lifecycle (M29 · reviewer · pending_assessment only)
      tags: [ge-programs]
      parameters:
        - $ref: '#/components/parameters/ProgramId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StrategicAssessRequest'
      responses:
        '200':
          description: Assessed program (then archived)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgramMetadata'
        '400':
          description: not pending_assessment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '403':
          $ref: '#/components/responses/Forbidden'
  /ge/programs/{program_id}/people-summary:
    get:
      operationId: getProgramPeopleSummary
      summary: People rollup for program (M30)
      tags: [ge-programs]
      parameters:
        - $ref: '#/components/parameters/ProgramId'
        - name: include_completed
          in: query
          schema: { type: integer, enum: [0, 1], default: 0 }
        - name: include_archived
          in: query
          schema: { type: integer, enum: [0, 1], default: 0 }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PeopleSummary'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /ge/projects:
    get:
      operationId: listGeProjects
      summary: List projects (JWT participant ∪ draft creator ∪ subtree_governor P2; reviewer via skstudio BFF)
      tags: [ge-projects]
      responses:
        '200':
          description: Project list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectSummary'
    post:
      operationId: createGeProject
      summary: Atomically create project graph (draft · default Program any user · non-default Program subtree_governor P2)
      tags: [ge-projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateProjectResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /ge/projects/{project_id}:
    get:
      operationId: getGeProject
      summary: Project detail
      tags: [ge-projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project detail
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: patchGeProject
      summary: Update name, pm_user_id, or program_id (P2 · structural · PM or subtree_governor or reviewer service)
      tags: [ge-projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchProjectRequest'
      responses:
        '200':
          description: Updated
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      operationId: deleteGeProject
      summary: Soft-delete empty project (PM or subtree_governor or reviewer · project_is_empty)
      tags: [ge-projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '204':
          description: Soft deleted
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /ge/projects/{project_id}/program:
    patch:
      operationId: patchGeProjectProgram
      summary: Migrate project to another program (P2 · source/target subtree_governor or PM or reviewer · AuditEvent)
      tags: [ge-projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchProjectProgramRequest'
      responses:
        '200':
          description: Updated
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /ge/projects/{project_id}/project-note:
    patch:
      operationId: bindGeProjectNote
      summary: Bind project_note_id for legacy backfill (service token only · GE-T50)
      tags: [ge-projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [project_note_id]
              properties:
                project_note_id:
                  type: string
                  format: uuid
                  description: KB note stable id; only when current value is null
      responses:
        '200':
          description: Project with bound note
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: project_note_already_bound
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
  /ge/projects/{project_id}/people-summary:
    get:
      operationId: getProjectPeopleSummary
      summary: PM + assignee people summary (M30)
      tags: [ge-projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - name: include_completed
          in: query
          schema: { type: integer, enum: [0, 1], default: 0 }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PeopleSummary'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /ge/projects/{project_id}/graph:
    get:
      operationId: getGeProjectGraph
      summary: Project execution graph for Canvas
      tags: [ge-projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Graph
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectGraph'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /ge/projects/{project_id}/phases/{phase_id}/tasks:
    post:
      operationId: addGePhaseTask
      summary: Add task to phase (pm or subtree_governor; assignee_user_id required)
      description: |
        Creates a task in the given phase. assignee_user_id is required;
        the server does not fall back to pm_user_id when omitted or empty.
        M23: initial effective_status is derived at read time (typically waiting).
      tags: [ge-tasks]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/PhaseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddPhaseTaskRequest'
      responses:
        '200':
          description: Updated graph
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectGraph'
        '400':
          description: invalid_assignee or invalid_request
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /ge/projects/{project_id}/phases/{phase_id}/gate-items:
    post:
      operationId: addGePhaseGateItem
      summary: Add gate item to phase (pm or subtree_governor)
      tags: [ge-gate-items]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/PhaseId'
      requestBody:
        required: true
        content:
