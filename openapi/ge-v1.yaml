openapi: 3.0.3
info:
  title: skstudio Project Governance (ge/org) API
  description: |
    Normative OpenAPI for P1 project governance domain (v1.1.3 · P1 spec frozen).
    Full spec: docs/目标与执行及其组织支撑(实现与测试).md §4.9
    Business rules: docs/目标与执行及其组织支撑(需求).md v2.10.8
    M20: system lifecycle tasks (启动项目/结项复盘/确认结项) · is_system on Task/GateItem
    M20b: 结项复盘 auto-seeded PM sign route (确认结项 prerequisite) · system_sign_route_immutable
    M21: permission simplification · PM=reviewer governance · not_project_governor
    v1.10.0: gate.includes auto-sync · POST/DELETE includes → 410 · Canvas produce/prerequisite only
    v1.10.2: end closure sign route auto-seed · protected prerequisite edge
    v1.11.0: M22 Deviation · open/activate/extend/cancel · graph is_overdue · queues deviation_actions
    v1.11.1: WriteOperationResponse.deviation · AffectedTask P3 fields · Deviation cancel snapshots · submit/done 409 deviation_not_activated
    v1.11.2: M22 deviation structure guards · produce unlink/rebind · patch deviated · delete remediation → 409 deviation_produce_immutable / task_deviated_immutable / remediation_task_not_deletable
    v1.12.0: REST-only workbench · DROP ge_execution_notifications · no skstudio ws-fanout
    Out of scope: skstudio BFF /api/v1/org|ge/* and POST /internal/ge/deviation-notify (see impl doc §4.0 · §5)
  version: 1.12.0
servers:
  - url: /api/v1
    description: goal_execution service (JWT participant + service governance via skstudio BFF)
paths:
  /org/departments:
    get:
      operationId: listOrgDepartments
      summary: Department tree (P0)
      tags: [org]
      responses:
        '200':
          description: Department tree
  /org/teams/{team_id}:
    patch:
      operationId: patchOrgTeam
      summary: Update team (service · reviewer BFF)
      tags: [org]
      parameters:
        - name: team_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Updated team
    delete:
      operationId: deleteOrgTeam
      summary: Delete team · unassign members (service · reviewer BFF)
      tags: [org]
      parameters:
        - name: team_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted
  /org/departments/{department_id}:
    delete:
      operationId: deleteOrgDepartment
      summary: Delete department when no teams (service · reviewer BFF)
      tags: [org]
      parameters:
        - name: department_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted
        '409':
          description: department_has_teams
  /org/members:
    get:
      operationId: listOrgMembers
      summary: All org member profiles (service token · BFF aggregate)
      tags: [org]
      responses:
        '200':
          description: Member list
  /org/users/{user_id}/profile:
    get:
      operationId: getOrgUserProfile
      summary: Read org profile (JWT self only; reviewer others via skstudio BFF)
      tags: [org]
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User org profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserOrgProfile'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /ge/objectives:
    get:
      operationId: listGeObjectives
      summary: Objective tree with nested program metadata (no foreign project names)
      tags: [ge-objectives]
      responses:
        '200':
          description: Objective tree
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ObjectiveNode'
  /ge/programs:
    get:
      operationId: listGePrograms
      summary: Program list (metadata only)
      tags: [ge-programs]
      responses:
        '200':
          description: Program list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProgramMetadata'
  /ge/programs/{program_id}:
    get:
      operationId: getGeProgram
      summary: Program detail with projects[] (JWT participant filter; reviewer via BFF)
      tags: [ge-programs]
      parameters:
        - $ref: '#/components/parameters/ProgramId'
      responses:
        '200':
          description: Program detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgramDetail'
        '404':
          $ref: '#/components/responses/NotFound'
  /ge/projects:
    get:
      operationId: listGeProjects
      summary: List projects (JWT participant ∪ draft creator; reviewer via skstudio BFF)
      tags: [ge-projects]
      responses:
        '200':
          description: Project list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectSummary'
    post:
      operationId: createGeProject
      summary: Atomically create project graph (draft)
      tags: [ge-projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateProjectResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /ge/projects/{project_id}:
    get:
      operationId: getGeProject
      summary: Project detail
      tags: [ge-projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project detail
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: patchGeProject
      summary: Update name or pm_user_id (M19 name syncs project Note title via BFF)
      tags: [ge-projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchProjectRequest'
      responses:
        '200':
          description: Updated
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      operationId: deleteGeProject
      summary: Soft-delete empty project (PM or reviewer governance · project_is_empty)
      tags: [ge-projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '204':
          description: Soft deleted
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /ge/projects/{project_id}/project-note:
    patch:
      operationId: bindGeProjectNote
      summary: Bind project_note_id for legacy backfill (service token only · GE-T50)
      tags: [ge-projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [project_note_id]
              properties:
                project_note_id:
                  type: string
                  format: uuid
                  description: KB note stable id; only when current value is null
      responses:
        '200':
          description: Project with bound note
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: project_note_already_bound
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
  /ge/projects/{project_id}/graph:
    get:
      operationId: getGeProjectGraph
      summary: Project execution graph for Canvas
      tags: [ge-projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Graph
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectGraph'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /ge/projects/{project_id}/phases/{phase_id}/tasks:
    post:
      operationId: addGePhaseTask
      summary: Add task to phase (pm; assignee_user_id required)
      description: |
        Creates a blocked task in the given phase. assignee_user_id is required;
        the server does not fall back to pm_user_id when omitted or empty.
      tags: [ge-tasks]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/PhaseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddPhaseTaskRequest'
      responses:
        '200':
          description: Updated graph
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectGraph'
        '400':
          description: invalid_assignee or invalid_request
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /ge/projects/{project_id}/phases/{phase_id}/gate-items:
    post:
      operationId: addGePhaseGateItem
      summary: Add gate item to phase (pm)
      tags: [ge-gate-items]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/PhaseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddPhaseGateItemRequest'
      responses:
        '200':
          description: Updated graph
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectGraph'
        '400':
          description: invalid_request or schedule validation
        '403':
          $ref: '#/components/responses/Forbidden'
  /ge/phases/{phase_id}:
    patch:
      operationId: patchGePhase
      summary: Update business phase name and planned window (pm)
      tags: [ge-phases]
      parameters:
        - $ref: '#/components/parameters/PhaseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                planned_start:
                  type: string
                  format: date
                  nullable: true
                planned_end:
                  type: string
                  format: date
                  nullable: true
      responses:
        '200':
          description: Updated graph
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectGraph'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteGePhase
      summary: Delete empty non-active business phase (pm)
      tags: [ge-phases]
      parameters:
        - $ref: '#/components/parameters/PhaseId'
      responses:
        '200':
          description: Updated graph
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectGraph'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /ge/tasks/{task_id}:
    get:
      operationId: getGeTaskContext
      summary: Task context for deep links (M12)
      tags: [ge-tasks]
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: Task with project_id and phase_id
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: patchGeTask
      summary: Update assignee_user_id, title, or phase_id (pm)
      tags: [ge-tasks]
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                assignee_user_id:
                  type: string
                title:
                  type: string
                phase_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Updated task
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      operationId: deleteGeTask
      summary: Delete blocked task with no links (pm)
      tags: [ge-tasks]
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: Updated graph
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /ge/tasks/{task_id}/start:
    post:
      operationId: startGeTask
      summary: ready to running (assignee)
      tags: [ge-tasks]
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: Write operation response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WriteOperationResponse'
  /ge/tasks/{task_id}/done:
    post:
      operationId: doneGeTask
      summary: running to done (assignee)
      tags: [ge-tasks]
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: Write operation response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WriteOperationResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /ge/gate-items/{gate_item_id}:
    get:
      operationId: getGeGateItemContext
      summary: Gate item context for deep links (M12)
      tags: [ge-gate-items]
      parameters:
        - $ref: '#/components/parameters/GateItemId'
      responses:
        '200':
          description: Gate item with project_id, phase_id, gate_id
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: patchGeGateItem
      summary: Update gate item name, phase_id, planned_due, form, or definition fields (pm; draft only for form)
      tags: [ge-gate-items]
      parameters:
        - $ref: '#/components/parameters/GateItemId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                phase_id:
                  type: string
                  format: uuid
                planned_due:
                  type: string
                  format: date
                form:
                  type: string
                  enum: [material, metric, status]
                target_value:
                  oneOf:
                    - type: number
                    - type: string
                    - type: boolean
                operator:
                  type: string
                  enum: ['>=', '<=', '==', '>', '<']
                target_state:
                  type: string
      responses:
        '200':
          description: Updated graph
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteGeGateItem
      summary: Delete draft gate item with no links (pm)
      tags: [ge-gate-items]
      parameters:
        - $ref: '#/components/parameters/GateItemId'
      responses:
        '200':
          description: Updated graph
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /ge/gate-items/{gate_item_id}/submit:
    post:
      operationId: submitGeGateItem
      summary: Submit gate item (produce assignee)
      tags: [ge-gate-items]
      parameters:
        - $ref: '#/components/parameters/GateItemId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                payload:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Write operation response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WriteOperationResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /ge/gate-items/{gate_item_id}/sign:
    post:
      operationId: signGeGateItem
      summary: Sign gate item (eligible signer)
      tags: [ge-gate-items]
      parameters:
        - $ref: '#/components/parameters/GateItemId'
      responses:
        '200':
          description: Write operation response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WriteOperationResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /ge/gate-items/{gate_item_id}/reject:
    post:
      operationId: rejectGeGateItem
      summary: Reject gate item (eligible signer)
      tags: [ge-gate-items]
      parameters:
        - $ref: '#/components/parameters/GateItemId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reject_reason]
              properties:
                reject_reason:
                  type: string
                  minLength: 10
                  maxLength: 500
      responses:
        '200':
          description: Write operation response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WriteOperationResponse'
  /ge/audit-events:
    get:
      operationId: listGeAuditEvents
      summary: List audit events for an entity (M12)
      tags: [ge-audit]
      parameters:
        - name: entity_type
          in: query
          required: true
          schema:
            type: string
            enum: [task, gate_item]
        - name: entity_id
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
      responses:
        '200':
          description: Audit event list
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '403':
          $ref: '#/components/responses/Forbidden'
  /ge/gate-items/{gate_item_id}/deviations/open:
    post:
      operationId: openGateItemDeviation
      summary: Open deviation phase A (PM/reviewer · M22 P3)
      tags: [ge-deviations]
      parameters:
        - $ref: '#/components/parameters/GateItemId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpenDeviationRequest'
      responses:
        '200':
          description: Deviation opened · graph slice
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WriteOperationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /ge/deviations/{deviation_id}:
    get:
      operationId: getGeDeviation
      summary: Deviation detail
      tags: [ge-deviations]
      parameters:
        - name: deviation_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Deviation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deviation'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: patchGeDeviation
      summary: Activate · extend · or cancel deviation
      tags: [ge-deviations]
      parameters:
        - name: deviation_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchDeviationRequest'
      responses:
        '200':
          description: Updated · graph slice
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WriteOperationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /ge/me/queues:
    get:
      operationId: getGeMeQueues
      summary: Current user submit / sign / ready_tasks queues
      tags: [ge-queues]
      responses:
        '200':
          description: Queues
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeQueuesResponse'
components:
  parameters:
    ProjectId:
      name: project_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TaskId:
      name: task_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    GateItemId:
      name: gate_item_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PhaseId:
      name: phase_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProgramId:
      name: program_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserId:
      name: user_id
      in: path
      required: true
      schema:
        type: string
  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDetail'
    Forbidden:
      description: Permission denied
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDetail'
    NotFound:
      description: Not found or soft-deleted (detail project_not_found)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDetail'
    Conflict:
      description: State conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDetail'
  schemas:
    ErrorDetail:
      type: object
      required: [detail]
      properties:
        detail:
          type: string
          description: e.g. project_not_found, gate_item_orphan_signer, note_title_conflict, project_note_required, deviation_not_activated, deviation_already_open, system_node_not_deviatable, deviation_produce_immutable, task_deviated_immutable, remediation_task_not_deletable
    PatchProjectRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
        pm_user_id:
          type: string
    CreateProjectRequest:
      type: object
      required: [name, pm_user_id, phases]
      properties:
        name:
          type: string
        pm_user_id:
          type: string
        program_id:
          type: string
          format: uuid
        project_note_id:
          type: string
          format: uuid
          description: M19 · KB note uuid · set by BFF after note creation
        phases:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CreatePhaseInput'
    CreatePhaseInput:
      type: object
      required: [sequence, name, gate_items, tasks]
      properties:
        sequence:
          type: integer
          minimum: 1
        name:
          type: string
        gate_items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/GateItemInput'
        tasks:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/TaskInput'
    GateItemInput:
      type: object
      required: [key, name, form]
      properties:
        key:
          type: string
          description: Request-scoped alias; not returned in graph (use gate_item id)
        name:
          type: string
        form:
          type: string
          enum: [material]
        payload:
          type: object
          additionalProperties: true
    TaskInput:
      type: object
      required: [key, title, assignee_user_id]
      properties:
        key:
          type: string
        title:
          type: string
        assignee_user_id:
          type: string
        produces:
          type: array
          items:
            type: string
          description: gate_item keys in create request only
        prerequisites:
          type: array
          items:
            type: string
          description: gate_item keys in create request only
    AddPhaseTaskRequest:
      type: object
      required: [assignee_user_id]
      properties:
        title:
          type: string
          description: Defaults to 新任务 when omitted
        assignee_user_id:
          type: string
          description: Required; server does not fall back to pm_user_id
    AddPhaseGateItemRequest:
      type: object
      required: [planned_due]
      properties:
        name:
          type: string
        planned_due:
          type: string
          format: date
        form:
          type: string
          enum: [material, metric, status]
          default: material
        target_value:
          oneOf:
            - type: number
            - type: string
        operator:
          type: string
          enum: ['>=', '<=', '==', '>', '<']
        target_state:
          type: string
    CreateProjectResponse:
      type: object
      required: [id, name, status, program_id, pm_user_id, created_by_user_id, project_note_id, graph_summary]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
          enum: [draft]
        program_id:
          type: string
          format: uuid
        pm_user_id:
          type: string
        created_by_user_id:
          type: string
        project_note_id:
          type: string
          format: uuid
          description: Bound project Note in 项目管理 topic
        graph_summary:
          type: object
          properties:
            phase_count:
              type: integer
            task_count:
              type: integer
            gate_item_count:
              type: integer
    ProjectGraph:
      type: object
      required: [project, phases]
      properties:
        project:
          $ref: '#/components/schemas/ProjectSummary'
        phases:
          type: array
          items:
            $ref: '#/components/schemas/PhaseGraph'
    ProjectSummary:
      type: object
      required: [id, name, status, pm_user_id, program_id, created_by_user_id]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
        pm_user_id:
          type: string
        program_id:
          type: string
        created_by_user_id:
          type: string
        project_note_id:
          type: string
          format: uuid
          nullable: true
          description: M19 · kb note uuid · null only for pre-M19 legacy rows
    ProgramMetadata:
      type: object
      required: [id, name, objective_id, is_default]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        objective_id:
          type: string
          format: uuid
        is_default:
          type: boolean
        owner_user_id:
          type: string
          nullable: true
    ObjectiveNode:
      type: object
      required: [id, name, is_default, programs]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        is_default:
          type: boolean
        owner_user_id:
          type: string
          nullable: true
        parent_id:
          type: string
          format: uuid
          nullable: true
        programs:
          type: array
          description: Program metadata only; no nested foreign project names
          items:
            $ref: '#/components/schemas/ProgramMetadata'
        children:
          type: array
          items:
            $ref: '#/components/schemas/ObjectiveNode'
    ProgramDetail:
      allOf:
        - $ref: '#/components/schemas/ProgramMetadata'
        - type: object
          required: [projects]
          properties:
            projects:
              type: array
              description: JWT filtered to participant ∪ draft creator
              items:
                $ref: '#/components/schemas/ProjectSummary'
    UserOrgProfile:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: string
        department_id:
          type: string
          nullable: true
        team_id:
          type: string
          nullable: true
        proficiency:
          type: string
          nullable: true
        manager_user_id:
          type: string
          nullable: true
    PhaseGraph:
      type: object
      required: [id, sequence, name, status, gate, gate_items, tasks]
      properties:
        id:
          type: string
        sequence:
          type: integer
        name:
          type: string
        status:
          type: string
        planned_start:
          type: string
          format: date
          nullable: true
        planned_end:
          type: string
          format: date
          nullable: true
        gate:
          type: object
          required: [id, is_open]
          properties:
            id:
              type: string
            is_open:
              type: boolean
        gate_items:
          type: array
          items:
            $ref: '#/components/schemas/GateItemGraph'
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/TaskGraph'
    GateItemGraph:
      type: object
      required: [id, name, form, status, eligible_signers]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        form:
          type: string
        status:
          type: string
        payload:
          type: object
        submitted_by:
          type: string
          nullable: true
        signed_by:
          type: string
          nullable: true
        rejected_by:
          type: string
          nullable: true
        planned_due:
          type: string
          format: date
          nullable: true
        submitted_at:
          type: string
          format: date-time
          nullable: true
        signed_at:
          type: string
          format: date-time
          nullable: true
        rejected_at:
          type: string
          format: date-time
          nullable: true
        reject_reason:
          type: string
          nullable: true
        eligible_signers:
          type: array
          items:
            type: string
        is_system:
          type: boolean
          description: M20 built-in lifecycle gate item; immutable structure
        is_overdue:
          type: boolean
          description: P3 derived · overdue stamp · mutually exclusive with deviation status stamp
        is_remediation_overdue:
          type: boolean
          description: P3 derived · remediation_due past · meta highlight · extend menu
        deviation:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/DeviationSummary'
    TaskGraph:
      type: object
      description: produces/prerequisites are ge_gate_items.id (UUID), not create-request keys
      required: [id, title, status, assignee_user_id, phase_id, produces, prerequisites]
      properties:
        id:
          type: string
        title:
          type: string
        status:
          type: string
        assignee_user_id:
          type: string
        phase_id:
          type: string
        produces:
          type: array
          description: ge_gate_items.id UUIDs
          items:
            type: string
            format: uuid
        prerequisites:
          type: array
          description: ge_gate_items.id UUIDs
          items:
            type: string
            format: uuid
        is_system:
          type: boolean
          description: M20 built-in lifecycle task; title/phase immutable; 确认结项 assignee follows pm_user_id (system_sign_route_immutable on assignee patch / prerequisite delete)
        deviation_id:
          type: string
          format: uuid
          nullable: true
          description: P3 remediation task only
        is_remediation:
          type: boolean
          description: P3 derived · deviation_id IS NOT NULL
    MeQueuesResponse:
      type: object
      required: [submit, sign, ready_tasks, deviation_actions]
      properties:
        submit:
          type: array
          items:
            $ref: '#/components/schemas/QueueGateItem'
        sign:
          type: array
          items:
            $ref: '#/components/schemas/QueueGateItem'
        ready_tasks:
          type: array
          items:
            $ref: '#/components/schemas/QueueReadyTask'
        deviation_actions:
          type: array
          items:
            $ref: '#/components/schemas/QueueDeviationAction'
    OpenDeviationRequest:
      type: object
      properties:
        kind:
          type: string
          enum: [overdue, scope]
          default: overdue
    PatchDeviationRequest:
      oneOf:
        - $ref: '#/components/schemas/ActivateDeviationRequest'
        - $ref: '#/components/schemas/ExtendDeviationRequest'
        - $ref: '#/components/schemas/CancelDeviationRequest'
      discriminator:
        propertyName: action
        mapping:
          activate: '#/components/schemas/ActivateDeviationRequest'
          extend: '#/components/schemas/ExtendDeviationRequest'
          cancel: '#/components/schemas/CancelDeviationRequest'
    ActivateDeviationRequest:
      type: object
      required: [action, reason, remediation_plan, remediation_due]
      properties:
        action:
          type: string
          enum: [activate]
        reason:
          type: string
        remediation_plan:
          type: string
        remediation_due:
          type: string
          format: date
        assignee_user_id:
          type: string
    ExtendDeviationRequest:
      type: object
      required: [action, remediation_due, extend_reason]
      properties:
        action:
          type: string
          enum: [extend]
        remediation_due:
          type: string
          format: date
        extend_reason:
          type: string
        remediation_plan:
          type: string
          description: Required when revision >= 3 before extend
    CancelDeviationRequest:
      type: object
      required: [action, cancel_reason]
      properties:
        action:
          type: string
          enum: [cancel]
        cancel_reason:
          type: string
    DeviationSummary:
      type: object
      required: [id, status, kind, revision]
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [open, active, closed, cancelled]
        kind:
          type: string
          enum: [overdue, scope]
        revision:
          type: integer
        remediation_due:
          type: string
          format: date
          nullable: true
        remediation_task_id:
          type: string
          format: uuid
    Deviation:
      allOf:
        - $ref: '#/components/schemas/DeviationSummary'
        - type: object
          properties:
            gate_item_id:
              type: string
              format: uuid
            project_id:
              type: string
              format: uuid
            reason:
              type: string
              nullable: true
            remediation_plan:
              type: string
              nullable: true
            superseded_task_id:
              type: string
              format: uuid
            gate_item_status_at_open:
              type: string
              description: GateItem status snapshot at open · cancel rollback
            superseded_task_status_at_open:
              type: string
              description: Superseded task status snapshot at open · cancel rollback
            opened_by_user_id:
              type: string
            opened_at:
              type: string
              format: date-time
            activated_at:
              type: string
              format: date-time
              nullable: true
            cancelled_at:
              type: string
              format: date-time
              nullable: true
    AffectedTask:
      type: object
      required: [id, title, status, assignee_user_id, phase_id]
      properties:
        id:
          type: string
        title:
          type: string
        status:
          type: string
        assignee_user_id:
          type: string
        phase_id:
          type: string
        deviation_id:
          type: string
          format: uuid
          nullable: true
        is_remediation:
          type: boolean
        produces:
          type: array
          items:
            type: string
            format: uuid
          description: Produce edge gate_item ids · refreshed on rebind/cancel
    WriteOperationResponse:
      type: object
      required: [gate_item, affected_tasks, gate, phase, project]
      properties:
        gate_item:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/GateItemGraph'
        affected_tasks:
          type: array
          items:
            $ref: '#/components/schemas/AffectedTask'
        deviation:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/DeviationSummary'
        gate:
          nullable: true
          type: object
          properties:
            id:
              type: string
            phase_id:
              type: string
            is_open:
              type: boolean
        phase:
          nullable: true
          type: object
          properties:
            id:
              type: string
            sequence:
              type: integer
            name:
              type: string
            status:
              type: string
        project:
          type: object
          required: [id, status]
          properties:
            id:
              type: string
            status:
              type: string
    QueueDeviationAction:
      type: object
      required: [action, project_id, project_name, gate_item_id, gate_item_name, phase_name]
      properties:
        action:
          type: string
          enum: [open, activate, extend]
        project_id:
          type: string
        project_name:
          type: string
        gate_item_id:
          type: string
        gate_item_name:
          type: string
        phase_name:
          type: string
        deviation_id:
          type: string
          nullable: true
        remediation_task_id:
          type: string
          nullable: true
    QueueGateItem:
      type: object
      required: [gate_item_id, gate_item_name, project_id, project_name, phase_name]
      properties:
        gate_item_id:
          type: string
        gate_item_name:
          type: string
        project_id:
          type: string
        project_name:
          type: string
        phase_name:
          type: string
        submitted_by_user_id:
          type: string
          nullable: true
    QueueReadyTask:
      type: object
      required: [task_id, task_title, project_id, project_name, phase_name]
      properties:
        task_id:
          type: string
        task_title:
          type: string
        project_id:
          type: string
        project_name:
          type: string
        phase_name:
          type: string
