openapi: 3.0.3
info:
  title: skstudio Project Governance (ge/org) API
  description: |
    Normative OpenAPI for P1 project governance domain (v1.1.3 · P1 spec frozen).
    Full spec: docs/目标与执行及其组织支撑(实现与测试).md §4.9
    Business rules: docs/目标与执行及其组织支撑(需求).md v2.1.3
    Out of scope: skstudio BFF /api/v1/org|ge/* and POST /internal/ge/ws-fanout (see impl doc §4.0 · §5.4)
  version: 1.0.5
servers:
  - url: /api/v1
    description: goal_execution service (JWT participant + service governance via skstudio BFF)
paths:
  /org/departments:
    get:
      operationId: listOrgDepartments
      summary: Department tree (P0)
      tags: [org]
      responses:
        '200':
          description: Department tree
  /org/users/{user_id}/profile:
    get:
      operationId: getOrgUserProfile
      summary: Read org profile (JWT self only; reviewer others via skstudio BFF)
      tags: [org]
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User org profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserOrgProfile'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /ge/objectives:
    get:
      operationId: listGeObjectives
      summary: Objective tree with nested program metadata (no foreign project names)
      tags: [ge-objectives]
      responses:
        '200':
          description: Objective tree
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ObjectiveNode'
  /ge/programs:
    get:
      operationId: listGePrograms
      summary: Program list (metadata only)
      tags: [ge-programs]
      responses:
        '200':
          description: Program list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProgramMetadata'
  /ge/programs/{program_id}:
    get:
      operationId: getGeProgram
      summary: Program detail with projects[] (JWT participant filter; reviewer via BFF)
      tags: [ge-programs]
      parameters:
        - $ref: '#/components/parameters/ProgramId'
      responses:
        '200':
          description: Program detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgramDetail'
        '404':
          $ref: '#/components/responses/NotFound'
  /ge/projects:
    get:
      operationId: listGeProjects
      summary: List projects (JWT participant ∪ draft creator; reviewer via skstudio BFF)
      tags: [ge-projects]
      responses:
        '200':
          description: Project list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectSummary'
    post:
      operationId: createGeProject
      summary: Atomically create project graph (draft)
      tags: [ge-projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateProjectResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /ge/projects/{project_id}:
    get:
      operationId: getGeProject
      summary: Project detail
      tags: [ge-projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project detail
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: patchGeProject
      summary: Update name or pm_user_id
      tags: [ge-projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Updated
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteGeProject
      summary: Soft-delete empty draft project (creator only)
      tags: [ge-projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '204':
          description: Soft deleted
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /ge/projects/{project_id}/activate:
    post:
      operationId: activateGeProject
      summary: draft to active (pm only)
      tags: [ge-projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Activated
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /ge/projects/{project_id}/graph:
    get:
      operationId: getGeProjectGraph
      summary: Project execution graph for Canvas
      tags: [ge-projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Graph
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectGraph'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /ge/tasks/{task_id}:
    patch:
      operationId: patchGeTask
      summary: Update assignee_user_id or title (pm)
      tags: [ge-tasks]
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                assignee_user_id:
                  type: string
                title:
                  type: string
      responses:
        '200':
          description: Updated task
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /ge/tasks/{task_id}/start:
    post:
      operationId: startGeTask
      summary: ready to running (assignee)
      tags: [ge-tasks]
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: Write operation response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WriteOperationResponse'
  /ge/tasks/{task_id}/done:
    post:
      operationId: doneGeTask
      summary: running to done (assignee)
      tags: [ge-tasks]
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: Write operation response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WriteOperationResponse'
  /ge/gate-items/{gate_item_id}/submit:
    post:
      operationId: submitGeGateItem
      summary: Submit gate item (produce assignee)
      tags: [ge-gate-items]
      parameters:
        - $ref: '#/components/parameters/GateItemId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                payload:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Write operation response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WriteOperationResponse'
  /ge/gate-items/{gate_item_id}/sign:
    post:
      operationId: signGeGateItem
      summary: Sign gate item (eligible signer)
      tags: [ge-gate-items]
      parameters:
        - $ref: '#/components/parameters/GateItemId'
      responses:
        '200':
          description: Write operation response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WriteOperationResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /ge/gate-items/{gate_item_id}/reject:
    post:
      operationId: rejectGeGateItem
      summary: Reject gate item (eligible signer)
      tags: [ge-gate-items]
      parameters:
        - $ref: '#/components/parameters/GateItemId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reject_reason]
              properties:
                reject_reason:
                  type: string
                  minLength: 10
                  maxLength: 500
      responses:
        '200':
          description: Write operation response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WriteOperationResponse'
  /ge/me/queues:
    get:
      operationId: getGeMeQueues
      summary: Current user submit / sign / ready_tasks queues
      tags: [ge-queues]
      responses:
        '200':
          description: Queues
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeQueuesResponse'
  /ge/me/execution-notifications:
    get:
      operationId: listGeExecutionNotifications
      summary: Phase progress notifications
      tags: [ge-notifications]
      parameters:
        - name: unread_only
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Notification list
components:
  parameters:
    ProjectId:
      name: project_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TaskId:
      name: task_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    GateItemId:
      name: gate_item_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProgramId:
      name: program_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserId:
      name: user_id
      in: path
      required: true
      schema:
        type: string
  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDetail'
    Forbidden:
      description: Permission denied
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDetail'
    NotFound:
      description: Not found or soft-deleted (detail project_not_found)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDetail'
    Conflict:
      description: State conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDetail'
  schemas:
    ErrorDetail:
      type: object
      required: [detail]
      properties:
        detail:
          type: string
          description: e.g. project_not_found, gate_item_orphan_signer
    CreateProjectRequest:
      type: object
      required: [name, pm_user_id, phases]
      properties:
        name:
          type: string
        pm_user_id:
          type: string
        program_id:
          type: string
          format: uuid
        phases:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CreatePhaseInput'
    CreatePhaseInput:
      type: object
      required: [sequence, name, gate_items, tasks]
      properties:
        sequence:
          type: integer
          minimum: 1
        name:
          type: string
        gate_items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/GateItemInput'
        tasks:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/TaskInput'
    GateItemInput:
      type: object
      required: [key, name, form]
      properties:
        key:
          type: string
          description: Request-scoped alias; not returned in graph (use gate_item id)
        name:
          type: string
        form:
          type: string
          enum: [material]
        payload:
          type: object
          additionalProperties: true
    TaskInput:
      type: object
      required: [key, title, assignee_user_id]
      properties:
        key:
          type: string
        title:
          type: string
        assignee_user_id:
          type: string
        produces:
          type: array
          items:
            type: string
          description: gate_item keys in create request only
        prerequisites:
          type: array
          items:
            type: string
          description: gate_item keys in create request only
    CreateProjectResponse:
      type: object
      required: [id, name, status, program_id, pm_user_id, created_by_user_id, graph_summary]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
          enum: [draft]
        program_id:
          type: string
          format: uuid
        pm_user_id:
          type: string
        created_by_user_id:
          type: string
        graph_summary:
          type: object
          properties:
            phase_count:
              type: integer
            task_count:
              type: integer
            gate_item_count:
              type: integer
    ProjectGraph:
      type: object
      required: [project, phases]
      properties:
        project:
          $ref: '#/components/schemas/ProjectSummary'
        phases:
          type: array
          items:
            $ref: '#/components/schemas/PhaseGraph'
    ProjectSummary:
      type: object
      required: [id, name, status, pm_user_id, program_id, created_by_user_id]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
        pm_user_id:
          type: string
        program_id:
          type: string
        created_by_user_id:
          type: string
    ProgramMetadata:
      type: object
      required: [id, name, objective_id, is_default]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        objective_id:
          type: string
          format: uuid
        is_default:
          type: boolean
        owner_user_id:
          type: string
          nullable: true
    ObjectiveNode:
      type: object
      required: [id, name, is_default, programs]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        is_default:
          type: boolean
        owner_user_id:
          type: string
          nullable: true
        parent_id:
          type: string
          format: uuid
          nullable: true
        programs:
          type: array
          description: Program metadata only; no nested foreign project names
          items:
            $ref: '#/components/schemas/ProgramMetadata'
        children:
          type: array
          items:
            $ref: '#/components/schemas/ObjectiveNode'
    ProgramDetail:
      allOf:
        - $ref: '#/components/schemas/ProgramMetadata'
        - type: object
          required: [projects]
          properties:
            projects:
              type: array
              description: JWT filtered to participant ∪ draft creator
              items:
                $ref: '#/components/schemas/ProjectSummary'
    UserOrgProfile:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: string
        department_id:
          type: string
          nullable: true
        team_id:
          type: string
          nullable: true
        proficiency:
          type: string
          nullable: true
        manager_user_id:
          type: string
          nullable: true
    PhaseGraph:
      type: object
      required: [id, sequence, name, status, gate, gate_items, tasks]
      properties:
        id:
          type: string
        sequence:
          type: integer
        name:
          type: string
        status:
          type: string
        gate:
          type: object
          required: [id, is_open]
          properties:
            id:
              type: string
            is_open:
              type: boolean
        gate_items:
          type: array
          items:
            $ref: '#/components/schemas/GateItemGraph'
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/TaskGraph'
    GateItemGraph:
      type: object
      required: [id, name, form, status, eligible_signers]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        form:
          type: string
        status:
          type: string
        payload:
          type: object
        submitted_by:
          type: string
          nullable: true
        signed_by:
          type: string
          nullable: true
        rejected_by:
          type: string
          nullable: true
        eligible_signers:
          type: array
          items:
            type: string
    TaskGraph:
      type: object
      description: produces/prerequisites are ge_gate_items.id (UUID), not create-request keys
      required: [id, title, status, assignee_user_id, phase_id, produces, prerequisites]
      properties:
        id:
          type: string
        title:
          type: string
        status:
          type: string
        assignee_user_id:
          type: string
        phase_id:
          type: string
        produces:
          type: array
          description: ge_gate_items.id UUIDs
          items:
            type: string
            format: uuid
        prerequisites:
          type: array
          description: ge_gate_items.id UUIDs
          items:
            type: string
            format: uuid
    MeQueuesResponse:
      type: object
      required: [submit, sign, ready_tasks]
      properties:
        submit:
          type: array
          items:
            $ref: '#/components/schemas/QueueGateItem'
        sign:
          type: array
          items:
            $ref: '#/components/schemas/QueueGateItem'
        ready_tasks:
          type: array
          items:
            $ref: '#/components/schemas/QueueReadyTask'
    QueueGateItem:
      type: object
      required: [gate_item_id, gate_item_name, project_id, project_name, phase_name]
      properties:
        gate_item_id:
          type: string
        gate_item_name:
          type: string
        project_id:
          type: string
        project_name:
          type: string
        phase_name:
          type: string
        submitted_by_user_id:
          type: string
          nullable: true
    QueueReadyTask:
      type: object
      required: [task_id, task_title, project_id, project_name, phase_name]
      properties:
        task_id:
          type: string
        task_title:
          type: string
        project_id:
          type: string
        project_name:
          type: string
        phase_name:
          type: string
    WriteOperationResponse:
      type: object
      required: [gate_item, affected_tasks, gate, phase, project]
      properties:
        gate_item:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/GateItemGraph'
        affected_tasks:
          type: array
          items:
            type: object
            required: [id, title, status, assignee_user_id, phase_id]
            properties:
              id:
                type: string
              title:
                type: string
              status:
                type: string
              assignee_user_id:
                type: string
              phase_id:
                type: string
        gate:
          nullable: true
          type: object
          properties:
            id:
              type: string
            phase_id:
              type: string
            is_open:
              type: boolean
        phase:
          nullable: true
          type: object
          properties:
            id:
              type: string
            sequence:
              type: integer
            name:
              type: string
            status:
              type: string
        project:
          type: object
          required: [id, status]
          properties:
            id:
              type: string
            status:
              type: string
